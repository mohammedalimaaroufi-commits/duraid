<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>المسابقة الثقافية - شاشة الجمهور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        /* المتغيرات الأساسية للهوية البصرية السينمائية */
        :root {
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --primary-neon: #22d3ee;
            --accent-red: #f43f5e;
            --gold-glow: #fbbf24;
            --silver: #e2e8f0;
            --bronze: #cd7f32;
            --text-main: #f8fafc;
            --transition-speed: 0.6s;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* خلفية جزيئات سينمائية */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(34, 211, 238, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(244, 63, 94, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* الهيدر المطلوب */
        header {
            height: 14vh;
            padding: 0 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-title { text-align: right; }
        .header-title h1 { 
            font-size: 2.8rem; 
            font-weight: 900; 
            background: linear-gradient(to left, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-title p { font-size: 1.2rem; color: var(--primary-neon); letter-spacing: 2px; }

        #timer-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5.5rem;
            line-height: 1;
            font-weight: 900;
            color: var(--gold-glow);
            text-shadow: 0 0 40px rgba(251,191,36,0.3);
        }
        #timer.critical { color: var(--accent-red); animation: shake 0.2s infinite; }

        .stats-badge {
            background: var(--glass);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid rgba(34,211,238,0.2);
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* الحاوية الرئيسية للشاشات */
        main { flex: 1; position: relative; width: 100%; }

        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px;
            opacity: 0;
            transform: scale(1.05);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active { display: flex; opacity: 1; transform: scale(1); }

        /* 1. شاشة الانتظار المطورة (تدعم 50+ لاعب) */
        .players-wall {
            width: 95%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
        }
        .player-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 1rem;
            animation: entry 0.5s ease-out forwards;
        }

        /* 2. شاشة السؤال السينمائية */
        #question-screen { gap: 50px; }
        .question-card {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            width: 85%;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #question-text {
            font-size: 3.8rem;
            font-weight: 900;
            text-align: center;
            line-height: 1.4;
            color: #fff;
        }
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 80%;
        }
        .option-item {
            background: rgba(255,255,255,0.05);
            padding: 35px;
            border-radius: 25px;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .option-item.reveal-correct {
            background: #059669;
            border-color: #34d399;
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(52,211,153,0.3);
        }

        /* 3. شاشة الترتيب (Podium) */
        .podium-stage {
            display: flex;
            align-items: flex-end;
            gap: 50px;
            height: 60vh;
            margin-top: 50px;
        }
        .podium-column {
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 30px 30px 0 0;
            background: linear-gradient(to top, rgba(34,211,238,0.1), transparent);
            position: relative;
            padding-bottom: 20px;
        }
        .p-1 { height: 100%; border-top: 8px solid var(--gold-glow); }
        .p-2 { height: 75%; border-top: 8px solid var(--silver); }
        .p-3 { height: 55%; border-top: 8px solid var(--bronze); }

        .podium-name { font-size: 2rem; font-weight: 900; margin-bottom: 10px; }
        .podium-points { font-family: 'JetBrains Mono'; font-size: 3.5rem; color: var(--primary-neon); }
        .rank-label { 
            position: absolute; top: -60px; font-size: 4rem; font-weight: 900; opacity: 0.2; 
        }

        /* تذييل الصفحة */
        footer {
            height: 8vh;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        @keyframes entry {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">
        <h1>المسابقة الثقافية</h1>
        <p>أسئلة للجمهور</p>
    </div>
    <div id="timer-box">
        <div id="timer">--</div>
    </div>
    <div class="stats-badge">
        المشاركون: <span id="count-val" style="color: var(--primary-neon);">0</span>
    </div>
</header>

<main>
    <section id="wait-screen" class="screen active">
        <h2 style="font-size: 3.5rem; margin-bottom: 30px; color: var(--silver);">استعدوا للدخول في التحدي</h2>
        <div id="players-grid" class="players-wall"></div>
    </section>

    <section id="question-screen" class="screen">
        <div class="question-card">
            <h2 id="question-text">تحميل السؤال...</h2>
        </div>
        <div id="options-grid" class="options-container"></div>
    </section>

    <section id="leader-screen" class="screen">
        <h2 style="font-size: 3.5rem; color: var(--gold-glow);">لوحة شرف الأبطال</h2>
        <div id="podium-area" class="podium-stage"></div>
    </section>
</main>

<footer>
    <span>السؤال الحالي:</span>
    <span id="q-now" style="color: var(--primary-neon);">0</span>
    <span>من أصل</span>
    <span id="q-total">0</span>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    // عناصر الواجهة
    const timerEl = document.getElementById('timer');
    const screens = {
        wait: document.getElementById('wait-screen'),
        question: document.getElementById('question-screen'),
        leader: document.getElementById('leader-screen')
    };

    function activateScreen(target) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[target].classList.add('active');
    }

    let clock;

    // 1. تحديث اللاعبين (50+ لاعب بدقة عالية)
    socket.on('update-player-list', (list) => {
        document.getElementById('count-val').textContent = list.length;
        if (screens.wait.classList.contains('active')) {
            document.getElementById('players-grid').innerHTML = list.map(p => 
                `<div class="player-card">${p.name}</div>`
            ).join('');
        }
    });

    // 2. استقبال السؤال الجديد
    socket.on('next-question', (data) => {
        if (!data) return activateScreen('wait');

        activateScreen('question');
        document.getElementById('question-text').textContent = data.question.text;
        document.getElementById('q-now').textContent = data.index + 1;
        document.getElementById('q-total').textContent = data.total;

        document.getElementById('options-grid').innerHTML = data.question.options.map((opt, i) => 
            `<div class="option-item" id="opt-${i}">${opt}</div>`
        ).join('');

        // العداد الزمني
        let sec = data.timer;
        timerEl.textContent = sec;
        timerEl.classList.remove('critical');

        clearInterval(clock);
        clock = setInterval(() => {
            sec--;
            timerEl.textContent = (sec < 0) ? 0 : sec;
            if (sec <= 5) timerEl.classList.add('critical');
            if (sec <= 0) clearInterval(clock);
        }, 1000);
    });

    // 3. كشف الإجابة ثم الانتقال للترتيب (منطق زمن التغطية)
    socket.on('reveal-answer', (correctIdx) => {
        // تمييز الإجابة الصحيحة
        const target = document.getElementById(`opt-${correctIdx}`);
        if (target) target.classList.add('reveal-correct');

        // الانتظار لعرض الإجابة قبل الانتقال للترتيب
        setTimeout(() => {
            socket.emit('request-leaderboard');
        }, 5000);
    });

    // 4. بناء منصة التتويج (Podium)
    socket.on('update-leaderboard', (data) => {
        activateScreen('leader');
        const podium = document.getElementById('podium-area');
        const top = data.slice(0, 3);
        
        // ترتيب العرض السينمائي (2 ثم 1 ثم 3)
        const order = [top[1], top[0], top[2]];
        
        podium.innerHTML = order.map((p, i) => {
            if (!p) return `<div style="width:280px"></div>`;
            const rank = (p === top[0]) ? 1 : (p === top[1] ? 2 : 3);
            return `
                <div class="podium-column p-${rank}">
                    <span class="rank-label">${rank}</span>
                    <span class="podium-name">${p.name}</span>
                    <span class="podium-points">${p.score}</span>
                </div>
            `;
        }).join('');
    });

    // طلب تحديث أولي عند الاتصال
    socket.on('connect', () => {
        socket.emit('request-player-list');
    });
</script>
</body>
</html>
