<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة الكويز - صفحة المتسابق</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="login-screen" class="card">
            <h1>مسابقة التحدي</h1>
            <div class="input-group">
                <input type="text" id="username" placeholder="أدخل اسمك هنا..." maxlength="15">
                <button id="btn-join" class="btn-success">انضمام الآن</button>
            </div>
        </div>

        <div id="waiting-screen" class="card" style="display:none;">
            <div class="pulse-icon">📍</div>
            <h2>هل أنت مستعد يا <span id="display-name"></span>؟</h2>
            <p>ستبدأ المسابقة في أي لحظة، يرجى الانتظار...</p>
            <div class="loader"></div>
        </div>

        <div id="question-screen" class="card" style="display:none;">
            <div class="header-quiz">
                <div id="timer-display">--</div>
                <div id="question-counter">السؤال</div>
            </div>
            
            <h2 id="question-text">جاري تحضير السؤال...</h2>
            
            <div id="options-container" class="options-grid">
                </div>

            <div id="feedback-msg" style="display:none; text-align: center; margin-top: 20px; font-weight: bold; color: var(--primary);">
                تم تسجيل إجابتك بنجاح. في انتظار النتائج...
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
