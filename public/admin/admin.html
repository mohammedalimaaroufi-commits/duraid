<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كويز ماستر برو - لوحة التحكم الاحترافية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #22d3ee;
      --primary-dark: #0891b2;
      --accent: #f43f5e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --gold: #fbbf24;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
      line-height: 1.5;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header-actions { display: flex; gap: 12px; align-items: center; }

    h1 { font-size: 2.1rem; font-weight: 800; }
    h1 span { color: var(--primary); }

    .status-online {
      background: rgba(34,211,238,0.1);
      color: var(--primary);
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid var(--primary);
      font-size: 0.9rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.8rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    label { display: block; margin-bottom: 0.6rem; color: var(--text-muted); font-weight: 600; }

    input[type="file"], input[type="number"] {
      width: 100%; padding: 0.9rem; border-radius: 10px;
      border: 1px solid var(--border); background: #0f172a; color: white;
    }

    .btn {
      font-family: inherit; font-weight: 700; padding: 0.8rem 1.5rem;
      border-radius: 10px; cursor: pointer; transition: all 0.2s; border: none;
    }

    .btn-primary { background: var(--primary); color: #0f172a; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    
    .btn-start {
      background: transparent; border: 2px solid var(--primary);
      color: var(--primary); font-size: 1.3rem; padding: 1.2rem 3rem;
    }
    .btn-start:hover:not(:disabled) { background: var(--primary); color: #0f172a; }

    .control-bar { display: flex; gap: 1.5rem; align-items: center; margin-bottom: 2rem; }

    .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.8rem; }

    #admin-timer {
      font-family: 'JetBrains Mono', monospace; font-size: 5rem;
      color: var(--accent); text-align: center; margin: 1rem 0;
    }

    .question-preview { background: #0f172a; padding: 1.5rem; border-radius: 12px; }

    .options-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .opt { padding: 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); border-right: 4px solid var(--primary); }
    .opt.correct { background: rgba(34,211,238,0.2); border-color: var(--gold); }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border); }

    .podium-grid { display: flex; justify-content: center; align-items: flex-end; gap: 2rem; min-height: 400px; }
    .podium-step { background: rgba(255,255,255,0.08); border-radius: 16px 16px 0 0; padding: 1.5rem; text-align: center; width: 200px; }
    .rank-1 { height: 350px; border-top: 6px solid var(--gold); }
    .rank-2 { height: 280px; border-top: 6px solid #cbd5e1; }
    .rank-3 { height: 220px; border-top: 6px solid #d97706; }

    .blink { animation: blink 1.4s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }

    @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>لوحة <span>التحكم</span></h1>
    <div class="header-actions">
      <button id="btn-reset-game" class="btn btn-warning">🔄 تصفير اللعبة</button>
      <button id="btn-restart-server" class="btn btn-danger">⚠️ ريستارت السيرفر</button>
      <div class="status-online">● متصل</div>
    </div>
  </header>

  <section id="setup-section">
    <div class="card">
      <h2>إعداد المسابقة الثقافية</h2>
      <div class="setup-grid">
        <div>
          <label>رفع ملف الأسئلة (JSON)</label>
          <input type="file" id="file-input" accept=".json">
        </div>
        <div>
          <label>وقت الإجابة (ثانية)</label>
          <input type="number" id="timer-input" value="15">
        </div>
      </div>
      <button id="btn-setup" class="btn btn-primary" style="width: 100%;">بدء الجلسة الآن</button>
    </div>
  </section>

  <section id="dashboard" style="display:none">
    <div class="control-bar">
      <button id="btn-start" class="btn btn-start">إطلاق السؤال الأول</button>
      <button id="btn-present" class="btn btn-start">🎥 فتح شاشة العرض</button>
      <div style="color: var(--accent); font-weight: 800;"><span class="blink">●</span> مباشر</div>
    </div>

    <div class="dashboard-grid">
      <div class="card">
        <h3>مراقبة السؤال</h3>
        <div id="admin-timer">--</div>
        <div class="question-preview" id="active-question" style="display:none">
          <div id="display-q-text" style="font-size: 1.5rem; font-weight: 700;"></div>
          <div class="options-preview" id="display-options"></div>
          <div id="reveal-box" style="display:none; margin-top:1.5rem; padding:1rem; background:rgba(34,211,238,0.1); border:1px dashed var(--primary); border-radius:8px; text-align:center;">
            <span style="color:var(--gold)">الإجابة الصحيحة: </span> <span id="answer-text"></span>
          </div>
        </div>
        <div style="margin-top:2rem">
          <h4>المتسابقون (<span id="player-count">0</span>)</h4>
          <div id="player-list" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"></div>
        </div>
      </div>

      <div class="card">
        <h3>جدول الترتيب</h3>
        <table>
          <thead><tr><th>#</th><th>الاسم</th><th>النقاط</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section id="podium" style="display:none">
    <div class="card" style="text-align:center">
        <h1 style="color:var(--gold); margin-bottom:2rem;">🏆 منصة التتويج النهائية 🏆</h1>
        <div class="podium-grid" id="podium-display"></div>
        <button onclick="location.reload()" class="btn btn-primary" style="margin-top:3rem;">بدء مسابقة جديدة</button>
    </div>
  </section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let questions = [], currentIndex = 0, timerId = null, leaderboardCache = [];

const setupSection = document.getElementById('setup-section'),
      dashboard = document.getElementById('dashboard'),
      podiumSection = document.getElementById('podium'),
      btnStart = document.getElementById('btn-start');

// 1. تحميل الأسئلة
document.getElementById('btn-setup').onclick = () => {
  const file = document.getElementById('file-input').files[0];
  if (!file) return alert("يرجى اختيار ملف الأسئلة");
  const reader = new FileReader();
  reader.onload = e => {
    try {
      questions = JSON.parse(e.target.result);
      setupSection.style.display = 'none';
      dashboard.style.display = 'block';
    } catch { alert("خطأ في ملف JSON"); }
  };
  reader.readAsText(file);
};

// 2. إدارة الجولة
btnStart.onclick = () => {
  if (btnStart.dataset.action === "podium") return showPodium();
  if (currentIndex >= questions.length) return;
  
  btnStart.disabled = true;
  document.getElementById('reveal-box').style.display = 'none';
  document.getElementById('active-question').style.display = 'block';
  
  const q = questions[currentIndex];
  const sec = parseInt(document.getElementById('timer-input').value) || 15;
  
  document.getElementById('display-q-text').textContent = q.text;
  document.getElementById('display-options').innerHTML = q.options.map((t,i)=>`<div class="opt" id="opt${i}">${t}</div>`).join('');
  
  socket.emit('send-question', { question: q, timer: sec, index: currentIndex, total: questions.length });
  
  let t = sec;
  document.getElementById('admin-timer').textContent = t;
  clearInterval(timerId);
  timerId = setInterval(() => {
    t--;
    document.getElementById('admin-timer').textContent = t;
    if (t <= 0) {
      clearInterval(timerId);
      setTimeout(() => revealAnswer(q), 5000);
    }
  }, 1000);
};

function revealAnswer(q) {
  const idx = q.answer;
  document.getElementById('answer-text').textContent = q.options[idx];
  document.getElementById('reveal-box').style.display = 'block';
  document.getElementById(`opt${idx}`).classList.add('correct');
  currentIndex++;
  btnStart.disabled = false;
  if (currentIndex < questions.length) {
    btnStart.textContent = `السؤال التالي (${currentIndex + 1})`;
  } else {
    btnStart.textContent = "إعلان النتائج النهائية 🏆";
    btnStart.dataset.action = "podium";
    btnStart.style.borderColor = "var(--gold)";
  }
}

// 3. أزرار الإدارة المتقدمة
document.getElementById('btn-reset-game').onclick = () => {
  if(confirm("هل تريد تصفير اللعبة وطرد جميع المتسابقين؟")) {
    socket.emit('admin-reset-game');
    location.reload();
  }
};

document.getElementById('btn-restart-server').onclick = () => {
  if(confirm("تحذير: سيتم إغلاق السيرفر وإعادة تشغيله. هل أنت متأكد؟")) {
    socket.emit('admin-restart-server');
    alert("جاري إعادة التشغيل... انتظر قليلاً ثم حدث الصفحة.");
  }
};

document.getElementById('btn-present').onclick = () => window.open('presenter.html', '_blank');

function showPodium() {
  dashboard.style.display = 'none';
  podiumSection.style.display = 'block';
  const container = document.getElementById('podium-display');
  const order = [1, 0, 2]; // ترتيب المراكز بصرياً
  container.innerHTML = order.map(pos => {
    const p = leaderboardCache[pos];
    return p ? `<div class="podium-step rank-${pos+1}"><div style="font-weight:900">${p.name}</div><div style="color:var(--primary)">${p.score}</div></div>` : `<div class="podium-step"></div>`;
  }).join('');
}

// 4. السوكيت
socket.on('update-player-list', list => {
  document.getElementById('player-count').textContent = list.length;
  document.getElementById('player-list').innerHTML = list.map(p => `<span class="status-online">${p.name}</span>`).join('');
});

socket.on('update-leaderboard', lb => {
  leaderboardCache = lb;
  document.getElementById('leaderboard-body').innerHTML = lb.map((p,i)=>`<tr><td>${i+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`).join('');
});

socket.on('force-reload', () => location.reload());
</script>
</body>
</html>
